<div class="filters">
  @for (cat of categories; track cat.key) {
    <button class="filter-chip"
            [class.active]="productSvc.activeCategory() === cat.key"
            (click)="setCategory(cat.key)">
      {{ cat.label }}
    </button>
  }
  <select class="sort-select" (change)="setSort($event)">
    <option value="name">Sort: Name</option>
    <option value="low">Price: Low → High</option>
    <option value="high">Price: High → Low</option>
  </select>
</div>

<div class="products-grid">
  @for (product of productSvc.filteredProducts(); track product.id) {
    <app-product-card
      [product]="product"
      (compareToggled)="toggleCompare(product)"
      (cartToggled)="addToCart(product)" />
  } @empty {
    <div class="no-results">No products found.</div>
  }
</div>
