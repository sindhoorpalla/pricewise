<nav>
  <div class="logo">Price<span>Wise</span></div>

  <div class="nav-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      type="text"
      placeholder="Search for products..."
      [ngModel]="productSvc.searchQuery()"
      (ngModelChange)="productSvc.searchQuery.set($event)"
      (keyup.enter)="onSearch()"
    />
    <button class="browse-btn" (click)="onSearch()" [disabled]="productSvc.isLoading()">
      @if (productSvc.isLoading()) {
        <span class="spin">⟳</span>
      } @else {
        Browse
      }
    </button>
  </div>

  <div class="nav-right">
    <button class="nav-tab" [class.active]="activeTab==='compare'" (click)="switchTab('compare')">
      Compare
      <span class="cmp-badge" [class.visible]="compareSvc.count() > 0">{{ compareSvc.count() }}</span>
    </button>
    <button class="nav-tab cart-tab" [class.active]="activeTab==='cart'" (click)="switchTab('cart')">
      Cart
      <span class="cart-badge" [class.visible]="cartSvc.count() > 0">{{ cartSvc.count() }}</span>
    </button>
    <button class="nav-tab" [class.active]="activeTab==='sell'" (click)="switchTab('sell')">Sell</button>
  </div>
</nav>
