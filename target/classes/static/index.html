<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PriceWise — Compare Prices, Buy Smart</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f0;--text2:#888;--text3:#555;--accent:#00e5a0;--accent2:#0066ff;--danger:#ff4444;--radius:12px;--radius2:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
h1,h2,h3{font-family:'Syne',sans-serif;}
nav{display:flex;align-items:center;gap:12px;padding:1rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);z-index:100;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;}.logo span{color:var(--accent);}
.nav-search{flex:1;min-width:200px;position:relative;}
.nav-search input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:10px 20px 10px 44px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;}
.nav-search input:focus{border-color:var(--accent);}
.nav-search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);opacity:0.4;}
.nav-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.nav-tab{padding:8px 16px;border-radius:40px;font-size:13px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.nav-tab:hover{color:var(--text);border-color:var(--border2);}
.nav-tab.active{background:var(--accent);color:#000;font-weight:500;}
.hero{text-align:center;padding:4rem 2rem 3rem;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,229,160,0.12),transparent);}
.hero-tag{display:inline-block;background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:var(--accent);border-radius:40px;padding:4px 14px;font-size:12px;font-weight:500;margin-bottom:1.5rem;}
.hero h1{font-size:clamp(2.2rem,6vw,4.5rem);font-weight:800;letter-spacing:-2px;line-height:1.1;margin-bottom:1rem;}
.hero h1 em{font-style:normal;color:var(--accent);}
.hero p{color:var(--text2);font-size:16px;max-width:520px;margin:0 auto 2rem;line-height:1.7;}
.hero-stats{display:flex;justify-content:center;gap:3rem;}
.hero-stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--accent);}
.hero-stat-label{font-size:12px;color:var(--text3);margin-top:2px;}
main{max-width:1200px;margin:0 auto;padding:2rem;}
.section{display:none;}.section.active{display:block;}
.filters{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap;align-items:center;}
.filter-chip{padding:6px 16px;border-radius:40px;font-size:13px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.filter-chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;transition:all 0.2s;}
.product-card:hover{transform:translateY(-2px);border-color:var(--border2);}
.product-card.in-compare{border-color:var(--accent2);}
.product-img{width:100%;height:140px;object-fit:contain;background:#fff;border-radius:var(--radius2);margin-bottom:10px;padding:8px;}
.product-img-placeholder{width:100%;height:140px;background:var(--surface2);border-radius:var(--radius2);margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.product-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.product-price{font-size:20px;font-weight:700;color:var(--accent);font-family:'Syne',sans-serif;margin-bottom:4px;}
.product-rating{font-size:11px;color:var(--text2);margin-bottom:10px;}
.prime-badge{display:inline-block;font-size:10px;background:rgba(0,102,255,0.15);color:#6699ff;padding:2px 8px;border-radius:4px;margin-bottom:8px;}
.card-btns{display:flex;gap:6px;}
.btn-cmp{flex:1;padding:6px;font-size:12px;border-radius:var(--radius2);cursor:pointer;border:1px solid var(--accent2);background:transparent;color:var(--accent2);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-cmp.on{background:var(--accent2);color:white;}
.btn-add{flex:1;padding:6px;font-size:12px;border-radius:var(--radius2);cursor:pointer;border:1px solid var(--accent);background:transparent;color:var(--accent);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-add.on{background:var(--accent);color:#000;font-weight:500;}
.loading-box{text-align:center;padding:3rem;color:var(--text2);grid-column:1/-1;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:var(--radius2);padding:1rem;color:#ff8888;font-size:13px;grid-column:1/-1;margin-bottom:1rem;}
.compare-empty{text-align:center;padding:4rem 2rem;color:var(--text2);}
.compare-table-wrap{overflow-x:auto;}
.compare-table{width:100%;border-collapse:collapse;min-width:500px;}
.compare-table th,.compare-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;text-align:left;vertical-align:top;}
.compare-table th{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;background:var(--surface);}
.compare-table td.label{color:var(--text2);font-size:12px;white-space:nowrap;}
.compare-table td.winner{color:var(--accent);font-weight:500;}
.winner-tag{font-size:10px;background:rgba(0,229,160,0.15);color:var(--accent);padding:2px 8px;border-radius:4px;display:inline-block;margin-left:4px;}
.ai-rec{background:var(--surface);border:1px solid rgba(0,229,160,0.2);border-radius:var(--radius);padding:1.25rem;margin-top:1.5rem;font-size:14px;line-height:1.7;color:var(--text2);}
.ai-rec-header{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;color:var(--accent);margin-bottom:8px;}
.btn-ai{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;font-size:13px;border-radius:40px;cursor:pointer;border:1px solid rgba(0,229,160,0.4);background:rgba(0,229,160,0.08);color:var(--accent);font-family:'DM Sans',sans-serif;margin-top:1.5rem;transition:all 0.15s;}
.cart-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.cart-thumb{width:60px;height:60px;object-fit:contain;background:#fff;border-radius:var(--radius2);padding:4px;flex-shrink:0;}
.cart-info{flex:1;}.cart-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:2px;}.cart-store{font-size:11px;color:var(--text2);}
.cart-price{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap;}
.cart-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px;transition:color 0.15s;}
.cart-remove:hover{color:var(--danger);}
.btn-checkout{width:100%;padding:14px;font-size:16px;font-weight:600;border-radius:40px;cursor:pointer;background:var(--accent);color:#000;border:none;font-family:'Syne',sans-serif;transition:all 0.15s;}
.btn-checkout:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,160,0.25);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid rgba(0,229,160,0.3);color:var(--text);padding:12px 20px;border-radius:var(--radius2);font-size:13px;z-index:999;transform:translateY(100px);opacity:0;transition:all 0.3s;}
.toast.show{transform:translateY(0);opacity:1;}
.api-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:1rem;padding:8px 12px;background:var(--surface);border-radius:var(--radius2);border:1px solid var(--border);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.status-dot.error{background:var(--danger);}
@media(max-width:640px){nav{padding:1rem;}.hero h1{font-size:2rem;}.hero-stats{gap:1.5rem;}}
</style>
</head>
<body>
<nav>
  <div class="logo">Price<span>Wise</span></div>
  <div class="nav-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search any product... (press Enter)"/>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('browse',this)">Browse</button>
    <button class="nav-tab" onclick="switchTab('compare',this)">Compare <span id="cmp-badge" style="background:rgba(0,102,255,0.2);color:#0066ff;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:2px;">0</span></button>
    <button class="nav-tab" onclick="switchTab('cart',this)">Cart <span id="cart-badge2" style="display:none;background:rgba(255,68,68,0.2);color:#ff8888;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:2px;">0</span></button>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">✦ Powered by Java Spring Boot · Real Amazon Data</div>
  <h1>Find the <em>best price</em><br/>for anything</h1>
  <p>Real Amazon product data fetched via Java Spring Boot backend. Search, compare, and buy smarter.</p>
  <div class="hero-stats">
    <div><div class="hero-stat-num">1M+</div><div class="hero-stat-label">Products</div></div>
    <div><div class="hero-stat-num">Live</div><div class="hero-stat-label">Prices</div></div>
    <div><div class="hero-stat-num">AI</div><div class="hero-stat-label">Recommendations</div></div>
  </div>
</div>

<main>
  <div id="sec-browse" class="section active">
    <div class="api-status" id="api-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting to Java backend...</span>
    </div>
    <div class="filters">
      <button class="filter-chip active" onclick="searchProducts('best selling electronics',this)">🔥 Trending</button>
      <button class="filter-chip" onclick="searchProducts('laptop',this)">💻 Laptops</button>
      <button class="filter-chip" onclick="searchProducts('smartphone',this)">📱 Phones</button>
      <button class="filter-chip" onclick="searchProducts('headphones',this)">🎧 Audio</button>
      <button class="filter-chip" onclick="searchProducts('smart tv',this)">📺 TVs</button>
      <button class="filter-chip" onclick="searchProducts('gaming',this)">🎮 Gaming</button>
      <button class="filter-chip" onclick="searchProducts('smart home',this)">🏠 Home</button>
    </div>
    <div id="products-grid" class="products-grid"></div>
  </div>

  <div id="sec-compare" class="section"><div id="compare-content"></div></div>
  <div id="sec-cart" class="section"><div id="cart-content"></div></div>
</main>

<div class="toast" id="toast"></div>

<script>
// Java Spring Boot backend base URL
// When running locally: http://localhost:8080
// When deployed: change to your server URL
const API_BASE = window.location.origin;

let cart = [], compareIds = [], allProducts = [];

// Check Java backend health on load
async function checkHealth() {
  try {
    const res = await fetch(`${API_BASE}/api/health`);
    const data = await res.json();
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('status-text').textContent = `Java backend connected · ${data.service} v${data.version}`;
  } catch(e) {
    document.getElementById('status-dot').className = 'status-dot error';
    document.getElementById('status-text').textContent = 'Java backend not running — start with: mvn spring-boot:run';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'compare') renderCompare();
  if (name === 'cart') renderCart();
}

async function searchProducts(query, el) {
  if (el) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }
  const grid = document.getElementById('products-grid');
  grid.innerHTML = `<div class="loading-box"><div class="spinner"></div><p>Java backend fetching "${query}" from Amazon...</p></div>`;
  try {
    // Calls Java Spring Boot REST API → /api/search?q=query
    const res = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');
    if (!data.data?.products?.length) {
      grid.innerHTML = '<div class="error-box">No products found. Try a different search.</div>';
      return;
    }
    allProducts = data.data.products.filter(p => p.product_price);
    renderGrid(allProducts);
  } catch (e) {
    grid.innerHTML = `<div class="error-box">❌ ${e.message}<br><small>Make sure Java Spring Boot is running: <code>mvn spring-boot:run</code></small></div>`;
  }
}

function renderGrid(products) {
  const grid = document.getElementById('products-grid');
  if (!products.length) { grid.innerHTML = '<div class="loading-box">No products found.</div>'; return; }
  grid.innerHTML = products.slice(0, 20).map(p => {
    const inCmp = compareIds.includes(p.asin);
    const inCart = cart.find(c => c.id === p.asin);
    const safeTitle = (p.product_title || '').replace(/'/g, "&#39;").replace(/"/g, "&quot;");
    const safeImg = (p.product_photo || '').replace(/'/g, "&#39;");
    const safePrice = (p.product_price || '').replace(/'/g, "&#39;");
    const safeUrl = (p.product_url || '').replace(/'/g, "&#39;");
    return `<div class="product-card ${inCmp ? 'in-compare' : ''}">
      ${safeImg
        ? `<img class="product-img" src="${safeImg}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
           <div class="product-img-placeholder" style="display:none">📦</div>`
        : `<div class="product-img-placeholder">📦</div>`}
      <div class="product-name">${p.product_title || ''}</div>
      <div class="product-price">${safePrice}</div>
      ${p.product_star_rating ? `<div class="product-rating">⭐ ${p.product_star_rating} · ${(p.product_num_ratings || 0).toLocaleString()} reviews</div>` : ''}
      ${p.is_prime ? `<div class="prime-badge">✦ Prime</div>` : ''}
      <div class="card-btns">
        <button class="btn-cmp ${inCmp ? 'on' : ''}" onclick='toggleCompare(${JSON.stringify(p.asin)},${JSON.stringify(p.product_title||"")},${JSON.stringify(safePrice)},${JSON.stringify(safeImg)})'>${inCmp ? '✓' : '⇄'} Compare</button>
        <button class="btn-add ${inCart ? 'on' : ''}" onclick='addCart(${JSON.stringify(p.asin)},${JSON.stringify(p.product_title||"")},${JSON.stringify(safePrice)},${JSON.stringify(safeImg)},${JSON.stringify(safeUrl)})'>${inCart ? '✓ Added' : '+ Cart'}</button>
      </div>
    </div>`;
  }).join('');
}

function toggleCompare(id, name, price, img) {
  if (compareIds.includes(id)) {
    compareIds = compareIds.filter(i => i !== id);
  } else {
    if (compareIds.length >= 4) { showToast('Max 4 products'); return; }
    compareIds.push(id);
    if (!allProducts.find(p => p.asin === id))
      allProducts.push({ asin: id, product_title: name, product_price: price, product_photo: img });
    showToast('Added to compare!');
  }
  document.getElementById('cmp-badge').textContent = compareIds.length;
  renderGrid(allProducts);
}

function renderCompare() {
  const prods = allProducts.filter(p => compareIds.includes(p.asin));
  const el = document.getElementById('compare-content');
  if (!prods.length) {
    el.innerHTML = '<div class="compare-empty"><h3 style="font-family:\'Syne\',sans-serif;margin-bottom:8px;">Nothing to compare yet</h3><p>Go to Browse and click ⇄ Compare on products.</p></div>';
    return;
  }
  const prices = prods.map(p => parseFloat((p.product_price || '$0').replace(/[^0-9.]/g, '')));
  const minPrice = Math.min(...prices.filter(x => x > 0));
  el.innerHTML = `
    <div style="font-weight:500;font-size:15px;font-family:'Syne',sans-serif;margin-bottom:1rem;">${prods.length} products compared</div>
    <div class="compare-table-wrap">
    <table class="compare-table">
      <thead><tr><th></th>${prods.map(p => `<th>${(p.product_title || '').substring(0, 40)}...</th>`).join('')}</tr></thead>
      <tbody>
        <tr><td class="label">Image</td>${prods.map(p => `<td>${p.product_photo ? `<img src="${p.product_photo}" style="width:80px;height:80px;object-fit:contain;background:#fff;border-radius:8px;padding:4px;">` : '📦'}</td>`).join('')}</tr>
        <tr><td class="label">Price</td>${prods.map((p, i) => { const isLowest = prices[i] === minPrice && prices[i] > 0; return `<td class="${isLowest ? 'winner' : ''}">${p.product_price || 'N/A'}${isLowest ? '<span class="winner-tag">best deal</span>' : ''}</td>`; }).join('')}</tr>
        <tr><td class="label">Rating</td>${prods.map(p => `<td>${p.product_star_rating ? `⭐ ${p.product_star_rating}` : 'N/A'}</td>`).join('')}</tr>
        <tr><td class="label">Reviews</td>${prods.map(p => `<td>${p.product_num_ratings?.toLocaleString() || 'N/A'}</td>`).join('')}</tr>
        <tr><td class="label">Prime</td>${prods.map(p => `<td>${p.is_prime ? '✅ Yes' : '❌ No'}</td>`).join('')}</tr>
        <tr><td></td>${prods.map(p => `<td><a href="${p.product_url || 'https://amazon.com'}" target="_blank" style="display:inline-block;padding:6px 14px;border-radius:8px;background:var(--accent);color:#000;font-size:12px;font-weight:500;text-decoration:none;">View on Amazon →</a></td>`).join('')}</tr>
      </tbody>
    </table></div>
    <button class="btn-ai" onclick="aiRecommend()">✦ AI recommendation</button>
    <div class="ai-rec" id="ai-rec" style="display:none;"></div>`;
}

async function aiRecommend() {
  const prods = allProducts.filter(p => compareIds.includes(p.asin));
  const box = document.getElementById('ai-rec');
  box.style.display = 'block';
  box.innerHTML = '<div class="ai-rec-header">✦ Analyzing...</div><div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0;display:inline-block;"></div>';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 400,
        messages: [{ role: 'user', content: `Compare these Amazon products and recommend the best one. Be concise (3-4 sentences), focus on value:\n${prods.map(p => `${p.product_title}: ${p.product_price}, ⭐${p.product_star_rating}, ${p.product_num_ratings} reviews`).join('\n')}` }]
      })
    });
    const data = await res.json();
    box.innerHTML = '<div class="ai-rec-header">✦ AI recommendation</div>' + (data.content?.map(c => c.text || '').join('') || 'Could not generate.');
  } catch (e) { box.innerHTML = 'Error — try again.'; }
}

function addCart(id, name, price, img, url) {
  if (cart.find(c => c.id === id)) { showToast('Already in cart!'); return; }
  cart.push({ id, name, price, img, url });
  const b = document.getElementById('cart-badge2');
  b.textContent = cart.length; b.style.display = 'inline';
  showToast('Added to cart!');
  renderGrid(allProducts);
}

function removeCart(id) {
  cart = cart.filter(c => c.id !== id);
  const b = document.getElementById('cart-badge2');
  b.textContent = cart.length; b.style.display = cart.length ? 'inline' : 'none';
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cart-content');
  if (!cart.length) { el.innerHTML = '<div style="text-align:center;padding:4rem 2rem;color:var(--text2);"><div style="font-size:3rem;margin-bottom:1rem;">🛒</div>Your cart is empty.</div>'; return; }
  const total = cart.reduce((s, c) => s + parseFloat((c.price || '$0').replace(/[^0-9.]/g, '')), 0);
  el.innerHTML = `<div style="max-width:600px;">
    <h2 style="font-size:22px;margin-bottom:1.5rem;">${cart.length} item${cart.length > 1 ? 's' : ''}</h2>
    ${cart.map(c => `<div class="cart-item">
      ${c.img ? `<img class="cart-thumb" src="${c.img}" alt="">` : '<div style="width:60px;height:60px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">📦</div>'}
      <div class="cart-info"><div class="cart-name">${(c.name || '').substring(0, 60)}...</div><div class="cart-store">via Amazon</div></div>
      <div class="cart-price">${c.price}</div>
      <button class="cart-remove" onclick="removeCart('${c.id}')">✕</button>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:1.5rem 0 1rem;">
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;">Total</div>
      <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent);">$${total.toFixed(2)}</div>
    </div>
    <button class="btn-checkout" onclick="checkout()">🔒 Buy on Amazon — $${total.toFixed(2)}</button>
    <p style="text-align:center;font-size:12px;color:#555;margin-top:12px;">Each item opens on Amazon to complete purchase</p>
  </div>`;
}

function checkout() { cart.forEach(c => { if (c.url) window.open(c.url, '_blank'); }); }

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) searchProducts(q, null); }
});

// Init
checkHealth();
searchProducts('best selling electronics', document.querySelector('.filter-chip'));
</script>
</body>
</html>
